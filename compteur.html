<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Compteur véhicules</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="container">

  <!-- Bouton ADMIN -->
  <button id="admin-btn" style="display:none; margin-bottom:15px;"
          onclick="window.location.href='./admin.html'">
    Administrateur
  </button>

  <!-- Bouton Déconnexion -->
  <button id="logout-btn" style="margin-bottom:15px;">
    Déconnexion
  </button>

  <h1>Véhicules de <span id="pseudo"></span></h1>

  <!-- Bouton ajout véhicule -->
  <button id="addVehicleBtn" class="primary-btn">
    Ajouter un véhicule
  </button>

  <!-- Liste des véhicules -->
  <div id="vehicleList" class="vehicle-list"></div>

</div>

<!-- MODALE AJOUT VEHICULE -->
<div class="modal" id="vehicleModal">
  <div class="modal-content">
    <h2>Ajouter un véhicule</h2>

    <input type="text" id="vehicleName" placeholder="Nom du véhicule">

    <br><br>

    <button id="takePhotoBtn">Prendre une photo</button>
    <br><br>

    <input type="file" id="uploadImage" accept="image/*">

    <br><br>

    <button id="saveVehicleBtn" class="primary-btn">
      Enregistrer
    </button>
  </div>
</div>

<script type="module" src="./js/compteur.js"></script>

</body>
</html>
