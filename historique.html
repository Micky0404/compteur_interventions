<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Historique des interventions</title>
<link rel="stylesheet" href="./css/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background:#0a0a0a;
  color:white;
  font-family:Arial, sans-serif;
  padding:20px;
  text-align:center;
}

h1 {
  color:#ff2a2a;
  text-shadow:0 0 8px rgba(255,42,42,0.6);
}

table {
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th, td {
  padding:10px;
  border-bottom:1px solid #333;
}

th {
  color:#ff2a2a;
}

canvas {
  margin-top:30px;
  background:#111;
  padding:20px;
  border-radius:12px;
}
</style>
</head>

<body>

<h1>Historique des interventions</h1>

<table>
  <thead>
    <tr>
      <th>Date</th>
      <th>Heure</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="history-table"></tbody>
</table>

<canvas id="chart" width="400" height="200"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="js/historique.js"></script>

</body>
</html>
